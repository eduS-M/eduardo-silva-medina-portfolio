<title>Línea de Vida · Eduardo Silva Medina</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #ffffff; color: #1a1a18; }

  /* ── HEADER ── */
  .lv-header { padding: 36px 32px 24px; border-bottom: 1px solid #EFEFEB; background: #fff; }
  .lv-header h1 { font-size: 32px; font-weight: 600; letter-spacing: -.3px; font-family: Georgia, serif; color: #1a1a18; }
  .lv-header p  { font-size: 24px; color: #7A7970; margin-top: 6px; font-family: Arial, sans-serif; }
  
.back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #2c5e5e; color: white; padding: 8px 14px;
    border-radius: 6px; text-decoration: none; font-family: Arial, sans-serif;
    font-size: 13px; transition: all 0.2s; margin-bottom: 8px;
  }
  .back-btn:hover { background: #1e5a8a; transform: translateX(-2px); }  

  /* ── FILTROS ── */
  .filter-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 14px 32px; background: #fff;
    border-bottom: 1px solid #EFEFEB;
    position: sticky; top: 0; z-index: 50;
  }
  .filter-row span { font-size: 14px; color: #7A7970; font-family: Arial, sans-serif; align-self: center; margin-right: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .fb { font-size: 15px; font-weight: 500; padding: 7px 16px; border-radius: 20px; border: 1px solid #C8C7C0; cursor: pointer; background: #fff; color: #3D3D3A; font-family: Arial, sans-serif; transition: all .18s; }
  .fb:hover { border-color: #7A7970; color: #1a1a18; }
  .fb.active[data-cat="todo"]        { background: #1a1a18; border-color: #1a1a18; color: #fff; }
  .fb.active[data-cat="cultural"]    { background: #6C63C9; border-color: #6C63C9; color: #fff; }
  .fb.active[data-cat="comunitario"] { background: #0A7C5C; border-color: #0A7C5C; color: #fff; }
  .fb.active[data-cat="teologico"]   { background: #1A5FA8; border-color: #1A5FA8; color: #fff; }
  .fb.active[data-cat="operaciones"] { background: #B84A1E; border-color: #B84A1E; color: #fff; }
  .fb.active[data-cat="estudios"]    { background: #3A6E10; border-color: #3A6E10; color: #fff; }
  .fb.active[data-cat="talleres"]    { background: #83a19d; border-color: #83a19d; color: #fff; }

  /* ── LEYENDA ── */
  .legend { display: flex; flex-wrap: wrap; gap: 16px; padding: 10px 32px; background: #F9F9F7; border-bottom: 1px solid #EFEFEB; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #7A7970; font-family: Arial, sans-serif; }
  .leg-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── TIMELINE ── */
  .tl-outer { position: relative; padding: 40px 0 60px; max-width: 960px; margin: 0 auto; }
  .tl-line  { position: absolute; left: 50%; transform: translateX(-1px); width: 2px; background: #EFEFEB; top: 0; bottom: 0; }

  .tl-item { display: flex; align-items: flex-start; margin-bottom: 28px; position: relative; opacity: 0; animation: fadeUp .4s ease forwards; }
  .tl-item.hidden { display: none !important; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .tl-col { width: calc(50% - 34px); flex-shrink: 0; }
  .tl-col.left  { padding-right: 20px; display: flex; justify-content: flex-end; }
  .tl-col.right { padding-left:  20px; display: flex; justify-content: flex-start; }

  .tl-mid { width: 68px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 18px; z-index: 2; gap: 4px; }
  .tl-dot  { width: 16px; height: 16px; border-radius: 50%; border: 2.5px solid #fff; flex-shrink: 0; }
  .tl-year { font-size: 18px; font-weight: 700; color: #7A7970; font-family: Arial, sans-serif; letter-spacing: .4px; white-space: nowrap; }

  /* ── TARJETA ── */
  .tl-card {
    background: #fff; border: 1px solid #EFEFEB; border-radius: 10px;
    padding: 16px 18px; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: box-shadow .18s, border-color .18s;
    position: relative; overflow: hidden;
    width: 100%; max-width: 360px; text-align: left;
  }
  .tl-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.10); border-color: #C8C7C0; }
  .tl-col.right .tl-card { border-left:  3px solid var(--accent, #ccc); }
  .tl-col.left  .tl-card { border-right: 3px solid var(--accent, #ccc); }

  .tl-cat-label { font-size: 12px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--accent, #aaa); margin-bottom: 10px; font-family: Arial, sans-serif; }
  .tl-title     { font-size: 18px; font-weight: 600; color: #1a1a18; line-height: 1.45; font-family: Arial, sans-serif; }
  .tl-toggle    { float: right; font-size: 12px; color: #C8C7C0; margin-left: 8px; transition: transform .2s; line-height: 1.6; }
  .tl-card.open .tl-toggle { transform: rotate(180deg); }

  .tl-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #EFEFEB; }
  .tl-card.open .tl-body { display: block; }
   .tl-desc { font-size: 16px; color: #5F5E5A; line-height: 1.75; font-family: Arial, sans-serif; }
  .tl-desc * { font-size: 16px !important; font-family: Arial, sans-serif !important; color: #5F5E5A !important; line-height: 1.75 !important; }

	/* Todos los elementos dentro de la descripción mantienen la misma fuente y tamaño */
	.tl-desc p  { font-size: 14px !important; font-family: Arial, sans-serif !important; color: #5F5E5A !important; line-height: 1.75 !important; margin-top: 8px !important; }
	.tl-desc ul,
	.tl-desc ol { font-size: 14px !important; font-family: Arial, sans-serif !important; color: #5F5E5A !important; line-height: 1.75 !important; margin-top: 8px !important; padding-left: 20px !important; }
	.tl-desc li { font-size: 14px !important; font-family: Arial, sans-serif !important; color: #5F5E5A !important; line-height: 1.75 !important; margin-bottom: 3px !important; }
	.tl-desc strong, .tl-desc b { font-family: Arial, sans-serif !important; color: #3D3D3A !important; }
	.tl-desc em, .tl-desc i     { font-family: Arial, sans-serif !important; }
  
  /* ══════════════════════════════════════════════
     FOTO — se adapta al contenido real de la imagen
     sin recortar nada, con fondo neutro.
     Al hacer clic abre el lightbox.
  ══════════════════════════════════════════════ */
  .tl-media-wrap {
    margin-top: 12px;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #F4F4F2;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-in;
  }
  .tl-photo {
    width: 100%;
    height: auto;          /* altura libre: la imagen dicta su proporción */
    max-height: 340px;     /* tope para fotos muy largas                   */
    object-fit: contain;   /* muestra la imagen completa sin recorte        */
    object-position: center;
    display: block;
    border-radius: 8px;
    transition: opacity .15s;
  }
  .tl-photo:hover { opacity: .88; }

  /* ══════════════════════════════════════════════
     VIDEO embed YouTube / Vimeo
  ══════════════════════════════════════════════ */
  .tl-video-wrap { margin-top: 12px; width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; }
  .tl-video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Video archivo directo */
  .tl-video-file { margin-top: 12px; width: 100%; border-radius: 8px; display: block; background: #000; max-height: 220px; }

  /* Placeholder */
  .tl-photo-placeholder {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 68px; border: 1px dashed #C8C7C0; border-radius: 8px;
    font-size: 12px; color: #C8C7C0; margin-top: 12px; font-family: Arial, sans-serif;
  }

  /* ══════════════════════════════════════════════
     LIGHTBOX
  ══════════════════════════════════════════════ */
  #lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.88);
    align-items: center; justify-content: center;
    cursor: zoom-out;
    padding: 24px;
  }
  #lightbox.active { display: flex; }
  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    cursor: default;
  }
  #lb-close {
    position: fixed; top: 18px; right: 22px;
    color: #fff; font-size: 32px; line-height: 1;
    cursor: pointer; background: none; border: none;
    font-family: Arial, sans-serif; opacity: .8;
    transition: opacity .15s;
  }
  #lb-close:hover { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 620px) {
    .tl-outer  { padding: 24px 0 40px; }
    .tl-line   { left: 20px; }
    .tl-item   { flex-direction: column !important; padding-left: 52px; }
    .tl-col.left, .tl-col.right { width: 100%; padding: 0; justify-content: flex-start; }
    .tl-col.empty { display: none; }
    .tl-mid    { position: absolute; left: 0; top: 10px; width: 40px; }
    .tl-card   { max-width: 100%; border-left: 3px solid var(--accent,#ccc) !important; border-right: none !important; }
    .filter-row, .legend { padding: 12px 16px; }
    .lv-header { padding: 28px 16px 16px; }
  }
</style>
</head>

/* ── LIGHTBOX ── */
function openLightbox(url) {
  var lb  = document.getElementById("lightbox");
  var img = document.getElementById("lb-img");
  img.src = url;
  lb.classList.add("active");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
  document.getElementById("lb-img").src = "";
  document.body.style.overflow = "";
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeLightbox();
});

 /* ── GENERAR BLOQUE DE MEDIA ── */
function buildMedia(ev) {
  var items = [];
  if (ev.medias) {
    items = Array.isArray(ev.medias) ? ev.medias : [ev.medias];
  } else if (ev.media) {
    items = [ev.media];
  }
  if (!items.length) return '';

  var html = '';
  items.forEach(function(m) {
    if (!m || !m.tipo) {
      html += '<div class="tl-photo-placeholder">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'
        + '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>'
        + '<path d="M21 15l-5-5L5 21"/></svg>'
        + ' Agregar foto o video</div>';
    }
    else if (m.tipo === "foto") {
      var u = m.url.replace(/'/g, "\\'");
      html += '<div class="tl-media-wrap" onclick="event.stopPropagation();openLightbox(\'' + u + '\')" title="Clic para ampliar">'
        + '<img class="tl-photo" src="' + m.url + '" alt="Imagen del hito" loading="lazy">'
        + '</div>';
    }
    else if (m.tipo === "fotos") {
      var cols = m.urls.length === 1 ? 1 : 2;
      html += '<div style="display:grid;grid-template-columns:repeat(' + cols + ',1fr);gap:6px;margin-top:12px;">';
      m.urls.forEach(function(url) {
        var u2 = url.replace(/'/g, "\\'");
        html += '<div style="border-radius:7px;overflow:hidden;background:#F4F4F2;cursor:zoom-in;" onclick="event.stopPropagation();openLightbox(\'' + u2 + '\')" title="Clic para ampliar">'
          + '<img src="' + url + '" loading="lazy" style="width:100%;height:auto;max-height:200px;object-fit:contain;display:block;">'
          + '</div>';
      });
      html += '</div>';
    }
    else if (m.tipo === "youtube") {
      html += '<div class="tl-video-wrap">'
        + '<iframe data-yt="' + m.id + '" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>'
        + '</div>';
    }
    else if (m.tipo === "vimeo") {
      html += '<div class="tl-video-wrap">'
        + '<iframe data-vimeo="' + m.id + '" src="" allowfullscreen allow="autoplay"></iframe>'
        + '</div>';
    }
    else if (m.tipo === "video") {
      html += '<video class="tl-video-file" controls preload="metadata">'
        + '<source src="' + m.url + '">Tu navegador no soporta video.</video>';
    }
  });
  return html;
} 
  
  
/* ── CONSTRUIR LÍNEA ── */
var tl = document.getElementById("timeline");

events.forEach(function(ev, i) {
  var c    = CAT[ev.cat];
  var item = document.createElement("div");
  item.className  = "tl-item";
  item.dataset.cat = ev.cat;
  item.style.cssText = "--accent:" + c.color + "; animation-delay:" + (i * 0.04) + "s";

  var cardHTML =
    '<div class="tl-card" onclick="toggleCard(this)">'
    + '<div class="tl-cat-label">' + c.label + '</div>'
    + '<span class="tl-toggle">&#9660;</span>'
    + '<div class="tl-title">' + ev.title + '</div>'
    + '<div class="tl-body">'
    + '<p class="tl-desc">' + ev.desc + '</p>'
    + buildMedia(ev)
    + '</div>'
    + '</div>';

  var midHTML =
    '<div class="tl-mid">'
    + '<div class="tl-dot" style="background:' + c.color + '; box-shadow:0 0 0 2px ' + c.color + '"></div>'
    + '<div class="tl-year">' + ev.year + '</div>'
    + '</div>';

  if (i % 2 === 0) {
    item.innerHTML = '<div class="tl-col left">' + cardHTML + '</div>' + midHTML + '<div class="tl-col right empty"></div>';
  } else {
    item.innerHTML = '<div class="tl-col left empty"></div>' + midHTML + '<div class="tl-col right">' + cardHTML + '</div>';
  }

  tl.appendChild(item);
});

/* ── TOGGLE TARJETA + AUTOPLAY VIDEO ── */
function toggleCard(card) {
  var wasOpen = card.classList.contains("open");
  card.classList.toggle("open");

  /* Si se acaba de ABRIR, activar autoplay en YouTube / Vimeo */
  if (!wasOpen) {
    /* YouTube */
    card.querySelectorAll("iframe[data-yt]").forEach(function(iframe) {
      if (!iframe.src || iframe.src === window.location.href) {
        iframe.src = "https://www.youtube.com/embed/"
          + iframe.dataset.yt
          + "?autoplay=1&rel=0&modestbranding=1";
      }
    });
    /* Vimeo */
    card.querySelectorAll("iframe[data-vimeo]").forEach(function(iframe) {
      if (!iframe.src || iframe.src === window.location.href) {
        iframe.src = "https://player.vimeo.com/video/"
          + iframe.dataset.vimeo
          + "?autoplay=1&byline=0&portrait=0";
      }
    });
  } else {
    /* Al CERRAR, pausar YouTube / Vimeo limpiando el src */
    card.querySelectorAll("iframe[data-yt], iframe[data-vimeo]").forEach(function(iframe) {
      iframe.src = "";
    });
  }
}

/* ── FILTROS ── */
document.querySelectorAll(".fb").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".fb").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    var cat   = btn.dataset.cat;
    var delay = 0;
    document.querySelectorAll(".tl-item").forEach(function(item) {
      var show = (cat === "todo" || item.dataset.cat === cat);
      item.classList.toggle("hidden", !show);
      if (show) {
        item.style.animationDelay = (delay++ * 0.04) + "s";
        item.style.opacity = "0";
        void item.offsetWidth;
        item.style.animation = "none";
        void item.offsetWidth;
        item.style.animation = "fadeUp .4s ease forwards";
      }
    });
  });
});
